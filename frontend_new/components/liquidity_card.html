<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Liquidity Card</title>
<link rel="stylesheet" href="liquidity_card.css">
</head>
<body>
<div class="liquidity-card">
<h2>Liquidity Monitor</h2>
<div class="score" id="liqScore">82%</div>
<div class="bar"><div id="fill" class="fill"></div></div>
<div class="status" id="status">HIGH LIQUIDITY</div>
<div class="stats">
<div><span>Volume</span><strong id="volume">12.4M</strong></div>
<div><span>Spread</span><strong id="spread">0.05%</strong></div>
<div><span>Institutional</span><strong id="inst">BUYING</strong></div>
</div>
</div>
<script src="liquidity_card.js"></script>
</body>
</html>
