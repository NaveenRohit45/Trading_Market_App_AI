<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Market Heat</title>
<link rel="stylesheet" href="market_heat.css">
</head>
<body>
<div class="heat-card">
<h2>Market Heat</h2>
<div class="heat-grid" id="heatGrid">
<div class="cell hot">NIFTY</div>
<div class="cell warm">BANKNIFTY</div>
<div class="cell cool">SENSEX</div>
<div class="cell neutral">FINNIFTY</div>
<div class="cell hot">RELIANCE</div>
<div class="cell cool">INFY</div>
<div class="cell warm">HDFC</div>
<div class="cell hot">ICICIBANK</div>
</div>
<div class="legend">
<span><i class="lg hot"></i> Hot</span>
<span><i class="lg warm"></i> Warm</span>
<span><i class="lg neutral"></i> Neutral</span>
<span><i class="lg cool"></i> Cool</span>
</div>
</div>
<script src="market_heat.js"></script>
</body>
</html>
