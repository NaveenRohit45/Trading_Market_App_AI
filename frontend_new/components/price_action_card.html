<!DOCTYPE html><html><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="price_action_card.css">
<title>Price Action Card</title></head><body>
<div class="card">
<h2>Price Action Analysis</h2>
<div class="trend" id="trend">BULLISH</div>
<div class="grid">
<div><span>Pattern</span><strong id="pattern">Bull Flag</strong></div>
<div><span>Structure</span><strong id="structure">HH • HL</strong></div>
<div><span>Support</span><strong id="support">25200</strong></div>
<div><span>Resistance</span><strong id="resistance">25380</strong></div>
<div><span>Breakout</span><strong id="breakout">Confirmed</strong></div>
<div><span>Strength</span><strong id="strength">92%</strong></div>
</div>
<p id="summary">Strong bullish continuation after breakout with increasing volume.</p>
</div>
<script src="price_action_card.js"></script>
</body></html>
