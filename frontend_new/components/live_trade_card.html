<!DOCTYPE html><html><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="live_trade_card.css"><title>Live Trade Card</title>
</head><body>
<div class="card">
<h2>Live Trade</h2>
<div id="signal" class="signal buy">BUY</div>
<div class="price">LTP: <span id="ltp">25240.50</span></div>
<div class="grid">
<div><span>Entry</span><strong id="entry">25235</strong></div>
<div><span>Target</span><strong id="target">25320</strong></div>
<div><span>Stop Loss</span><strong id="sl">25190</strong></div>
<div><span>P/L</span><strong id="pl">+₹420</strong></div>
</div>
<div class="status">Status: <span id="status">OPEN</span></div>
</div>
<script src="live_trade_card.js"></script>
</body></html>
