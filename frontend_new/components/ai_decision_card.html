
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="ai_decision_card.css">
<title>AI Decision Card</title>
</head>
<body>
<div class="decision-card">
<h2>AI Decision Engine</h2>
<div class="signal" id="signal">BUY</div>
<div class="confidence">Confidence: <span id="confidence">94%</span></div>
<div class="target-grid">
<div><span>Entry</span><strong id="entry">25240</strong></div>
<div><span>Target</span><strong id="target">25360</strong></div>
<div><span>Stop Loss</span><strong id="sl">25170</strong></div>
<div><span>Risk : Reward</span><strong id="rr">1 : 2.8</strong></div>
</div>
<p class="reason" id="reason">Strong bullish momentum with high volume confirmation.</p>
</div>
<script src="ai_decision_card.js"></script>
</body>
</html>
