
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Volatility Card</title>
<link rel="stylesheet" href="volatility_card.css">
</head>
<body>
<div class="vol-card">
<h2>Market Volatility</h2>
<div class="value" id="volValue">18.5</div>
<div class="meter"><div class="fill" id="volFill"></div></div>
<div class="level" id="volLevel">LOW VOLATILITY</div>
<div class="details">
<div><span>ATR</span><strong id="atr">128</strong></div>
<div><span>VIX</span><strong id="vix">13.8</strong></div>
<div><span>Market State</span><strong id="state">CALM</strong></div>
</div>
</div>
<script src="volatility_card.js"></script>
</body>
</html>
