<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="ai_command_center.css">
<title>AI Command Center</title>
</head>
<body>
<div class="panel">
<h2>AI Command Center</h2>
<div class="grid">
<div class="card"><span>AI Mode</span><strong id="mode">AUTO</strong></div>
<div class="card"><span>Signal</span><strong id="signal">BUY</strong></div>
<div class="card"><span>Confidence</span><strong id="confidence">91%</strong></div>
<div class="card"><span>Risk</span><strong id="risk">LOW</strong></div>
<div class="card"><span>Market</span><strong id="market">BULLISH</strong></div>
<div class="card"><span>Status</span><strong id="status">ACTIVE</strong></div>
</div>
<button id="execute">Execute AI Trade</button>
</div>
<script src="ai_command_center.js"></script>
</body></html>
