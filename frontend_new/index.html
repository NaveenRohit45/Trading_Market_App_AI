<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trading Market AI V3</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
body{margin:0;height:100vh;background:#081018;color:#F8FAFC;font-family:Inter,sans-serif}
#loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#081018}
.spin{width:64px;height:64px;border:6px solid #243447;border-top:6px solid #3B82F6;border-radius:50%;animation:s 1s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
.hidden{display:none}
</style></head>
<body>
<div id="loader"><div><div class="spin"></div><h2>Trading Market AI V3</h2><p>Initializing AI Command Center...</p></div></div>
<div id="app" class="hidden">
<div id="sidebar-root"></div>
<div id="topbar-root"></div>
<main id="dashboard-root"></main>
<div id="toast-container"></div>
<div id="notification-container"></div>
</div>
<script>
setTimeout(()=>{
document.getElementById('loader').classList.add('hidden');
document.getElementById('app').classList.remove('hidden');
console.log('Ready for sidebar, dashboard, websocket and TradingView.');
},1200);
</script>
</body></html>
